---
- name: Deploy app in a new namespace
  hosts: localhost
  tasks:
    - name: Create a k8s namespace
      kubernetes.core.k8s:
        name: my-app
        api_version: v1
        kind: Namespace
        state: present
        kubeconfig: /Users/nicolasghezzi/eks-provision-with-terraform/kubeconfig_myapp-eks-cluster
    - name: Deploy nginx app
      kubernetes.core.k8s:
        src: nginx-config.yaml
        state: present
        kubeconfig: /Users/nicolasghezzi/eks-provision-with-terraform/kubeconfig_myapp-eks-cluster
        namespace: my-app
        